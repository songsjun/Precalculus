<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Art of Problem Solving: Precalculus</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --text: #1c1917;
    --accent: #1d4ed8;
    --border: #d6d3d1;
    --sidebar-bg: #f5f5f4;
    --sidebar-hover: #e7e5e4;
    --sidebar-active: #dbeafe;
    --blockquote-bg: #fffbeb;
    --blockquote-border: #f59e0b;
    --code-bg: #f5f5f4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  #sidebar h2 {
    font-size: 14px;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Helvetica Neue', sans-serif;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #78716c;
  }
  .chapter-link {
    display: block;
    padding: 10px 16px;
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Helvetica Neue', sans-serif;
    border-bottom: 1px solid #e7e5e4;
    cursor: pointer;
    transition: background 0.15s;
  }
  .chapter-link:hover { background: var(--sidebar-hover); }
  .chapter-link.active { background: var(--sidebar-active); color: var(--accent); font-weight: 600; }
  .chapter-link .ch-num {
    display: inline-block;
    width: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Mobile sidebar toggle */
  #sidebar-toggle {
    display: none;
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 100;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
  }

  /* Main content */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 40px 60px 80px;
    max-width: 900px;
    scroll-behavior: smooth;
  }
  @media (min-width: 1400px) {
    #main { padding: 40px 80px 80px; }
  }
  @media (max-width: 768px) {
    #sidebar { position: fixed; left: -300px; z-index: 50; height: 100vh; transition: left 0.3s; }
    #sidebar.open { left: 0; }
    #sidebar-toggle { display: block; }
    #main { padding: 40px 20px 60px; max-width: 100%; }
  }

  /* Typography */
  #content h1 {
    font-size: 28px;
    margin: 0 0 24px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--accent);
  }
  #content h2 {
    font-size: 22px;
    margin: 36px 0 16px;
    color: #292524;
  }
  #content h3 {
    font-size: 18px;
    margin: 28px 0 12px;
    color: #44403c;
  }
  #content p {
    line-height: 1.75;
    margin: 10px 0;
  }
  #content ul, #content ol {
    margin: 10px 0 10px 24px;
    line-height: 1.75;
  }
  #content li { margin: 4px 0; }
  #content strong { color: #1c1917; }
  #content em { font-style: italic; }
  #content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* Blockquotes (concept boxes) */
  #content blockquote {
    background: var(--blockquote-bg);
    border-left: 4px solid var(--blockquote-border);
    padding: 12px 16px;
    margin: 16px 0;
    border-radius: 0 6px 6px 0;
    line-height: 1.7;
  }
  #content blockquote strong:first-child {
    color: #b45309;
  }

  /* Tables */
  #content table {
    border-collapse: collapse;
    margin: 16px auto;
    font-size: 15px;
  }
  #content table th, #content table td {
    border: 1px solid #a8a29e;
    padding: 6px 14px;
    text-align: center;
  }
  #content table th {
    background: #f5f5f4;
    font-weight: 700;
  }
  #content table tr:nth-child(even) {
    background: #fafaf9;
  }

  /* Code blocks */
  #content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
    margin: 12px 0;
  }
  #content code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 14px;
  }

  /* KaTeX display math */
  .katex-display {
    margin: 16px 0;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 0;
  }

  /* Loading state */
  #loading {
    text-align: center;
    padding: 60px;
    color: #78716c;
    font-family: sans-serif;
  }
  #loading .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 3px solid #d6d3d1;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Welcome page */
  .welcome { font-family: 'Helvetica Neue', sans-serif; max-width: 600px; }
  .welcome h1 { font-size: 24px; border: none; padding: 0; margin-bottom: 16px; }
  .welcome p { color: #57534e; font-size: 15px; line-height: 1.6; }
  .welcome .toc { list-style: none; margin: 20px 0; padding: 0; }
  .welcome .toc li { margin: 6px 0; }
  .welcome .toc a {
    color: var(--accent);
    text-decoration: none;
    font-size: 15px;
  }
  .welcome .toc a:hover { text-decoration: underline; }
  .welcome .toc .ch-num { font-weight: 700; display: inline-block; width: 28px; }
</style>
</head>
<body>

<button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>

<div id="sidebar">
  <h2>Chapters</h2>
  <div id="chapter-list"></div>
</div>

<div id="main">
  <div id="content">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  </div>
</div>

<script>
const chapters = [
  { num: 1, title: 'Functions Review' },
  { num: 2, title: 'Introduction to Trigonometric Functions' },
  { num: 3, title: 'Trigonometric Identities' },
  { num: 4, title: 'Applications to Geometry' },
  { num: 5, title: 'Parameterization and Trigonometric Coordinate Systems' },
  { num: 6, title: 'Basics of Complex Numbers' },
  { num: 7, title: 'Trigonometry and Complex Numbers' },
  { num: 8, title: 'Geometry of Complex Numbers' },
  { num: 9, title: 'Vectors in Two Dimensions' },
  { num: 10, title: 'Matrices in Two Dimensions' },
  { num: 11, title: 'Vectors and Matrices in Three Dimensions, Part 1' },
  { num: 12, title: 'Vectors and Matrices in Three Dimensions, Part 2' },
  { num: 13, title: 'Vector Geometry' },
];

const basePath = (() => {
  let p = window.location.pathname;
  p = p.replace(/\/[^/]*\.html$/, '/');
  p = p.replace(/\/chapter\d+\/?$/, '/');
  if (!p.endsWith('/')) p += '/';
  return p;
})();

function chapterFile(num) {
  return `chapter${String(num).padStart(2, '0')}.md`;
}

function chapterPath(num) {
  return `${basePath}chapter${num}`;
}

// Build sidebar
const listEl = document.getElementById('chapter-list');
chapters.forEach(ch => {
  const a = document.createElement('a');
  a.className = 'chapter-link';
  a.href = chapterPath(ch.num);
  a.dataset.num = ch.num;
  a.innerHTML = `<span class="ch-num">${ch.num}.</span> ${ch.title}`;
  a.onclick = (e) => {
    e.preventDefault();
    navigateTo(ch.num);
    document.getElementById('sidebar').classList.remove('open');
  };
  listEl.appendChild(a);
});

// Convert LaTeX tabular environments to HTML tables
function convertTabular(text) {
  return text.replace(/\\begin\{tabular\}\{[^}]*\}([\s\S]*?)\\end\{tabular\}/g, (match, body) => {
    let rows = body.replace(/\\hline/g, '').trim();
    let rowArr = rows.split(/\\\\\s*/).filter(r => r.trim());
    let html = '<table>\n';
    rowArr.forEach((row, i) => {
      let cells = row.split('&').map(c => c.trim());
      let tag = i === 0 ? 'th' : 'td';
      html += '<tr>';
      cells.forEach(cell => {
        cell = cell.replace(/\\\(/g, '$').replace(/\\\)/g, '$');
        html += `<${tag}>${cell}</${tag}>`;
      });
      html += '</tr>\n';
    });
    html += '</table>';
    return html;
  });
}

function preprocessMath(text) {
  text = convertTabular(text);
  return text;
}

function showWelcome() {
  const contentEl = document.getElementById('content');
  let tocHtml = '<ul class="toc">';
  chapters.forEach(ch => {
    tocHtml += `<li><a href="${chapterPath(ch.num)}" onclick="event.preventDefault();navigateTo(${ch.num})"><span class="ch-num">${ch.num}.</span> ${ch.title}</a></li>`;
  });
  tocHtml += '</ul>';
  contentEl.innerHTML = `<div class="welcome">
    <h1>The Art of Problem Solving: Precalculus</h1>
    <p>Art of Problem Solving textbook by Richard Rusczyk</p>
    ${tocHtml}
  </div>`;
}

async function loadChapter(num) {
  document.querySelectorAll('.chapter-link').forEach(a => {
    a.classList.toggle('active', parseInt(a.dataset.num) === num);
  });

  const ch = chapters.find(c => c.num === num);
  document.title = ch ? `Ch ${num}: ${ch.title} — AoPS Precalculus` : 'The Art of Problem Solving: Precalculus';

  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '<div id="loading"><div class="spinner"></div><p>Loading...</p></div>';

  const file = chapterFile(num);
  try {
    const resp = await fetch(`${basePath}${file}`);
    if (!resp.ok) throw new Error(`Failed to load ${file}`);
    let md = await resp.text();

    md = preprocessMath(md);
    const html = marked.parse(md);
    contentEl.innerHTML = html;

    renderMathInElement(contentEl, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\[', right: '\\]', display: true },
        { left: '\\(', right: '\\)', display: false },
      ],
      throwOnError: false,
      trust: true,
      strict: false,
    });

    document.getElementById('main').scrollTop = 0;
  } catch (e) {
    contentEl.innerHTML = `<p style="color:red;">Error loading chapter ${num}: ${e.message}</p>
    <p>Make sure the markdown files are in the same directory as this page.</p>
    <p>For local development:</p>
    <pre>python3 -m http.server 8080</pre>`;
  }
}

function navigateTo(num) {
  const url = chapterPath(num);
  history.pushState({ chapter: num }, '', url);
  loadChapter(num);
}

function getChapterFromPath() {
  const path = window.location.pathname;
  const match = path.match(/\/chapter(\d+)\/?$/);
  if (match) return parseInt(match[1]);
  const params = new URLSearchParams(window.location.search);
  const q = params.get('chapter');
  if (q) return parseInt(q);
  return null;
}

window.addEventListener('popstate', (e) => {
  if (e.state && e.state.chapter) {
    loadChapter(e.state.chapter);
  } else {
    const num = getChapterFromPath();
    if (num && num >= 1 && num <= 13) {
      loadChapter(num);
    } else {
      showWelcome();
      document.querySelectorAll('.chapter-link').forEach(a => a.classList.remove('active'));
    }
  }
});

// Handle 404.html SPA redirect
(function() {
  const params = new URLSearchParams(window.location.search);
  const redirectPath = params.get('p');
  if (redirectPath) {
    history.replaceState(null, '', basePath + decodeURIComponent(redirectPath));
  }
})();

// Initial load
const initialChapter = getChapterFromPath();
if (initialChapter && initialChapter >= 1 && initialChapter <= 13) {
  history.replaceState({ chapter: initialChapter }, '', chapterPath(initialChapter));
  loadChapter(initialChapter);
} else {
  showWelcome();
}
</script>

</body>
</html>
